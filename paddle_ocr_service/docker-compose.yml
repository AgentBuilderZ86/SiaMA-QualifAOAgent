services:
  paddle-ocr:
    build: .
    ports:
      - "${PADDLE_OCR_PORT:-8070}:8070"
    environment:
      PADDLE_OCR_LANG: "${PADDLE_OCR_LANG:-fr}"
      PADDLE_OCR_MAX_PDF_PAGES: "${PADDLE_OCR_MAX_PDF_PAGES:-4}"
      PADDLE_OCR_PORT: "8070"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8070/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
